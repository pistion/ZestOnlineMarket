name: Live App Checks

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zestonlinemarket
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zestonlinemarket"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: local
      JWT_SECRET: ci-test-secret-1234567890
      DB_PROVIDER: postgres
      FEATURE_SEARCH: true
      FEATURE_REVIEWS: true
      FEATURE_DISCOUNTS: true
      FEATURE_ADMIN: true
      IDENTITY_STORE_SOURCE: postgres
      CATALOG_SOURCE: postgres
      MIGRATION_MODE: off
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: zestonlinemarket
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run PostgreSQL migrations
        run: npm run db:migrate
        working-directory: .

      - name: Run unit tests
        run: npm run test:unit
        working-directory: .

      - name: Run integration tests
        run: npm test
        working-directory: .

      - name: JavaScript syntax check
        run: npm run check:js
        working-directory: .

      - name: Repo guard checks
        run: npm run check:repo
        working-directory: .

      - name: Size guard checks
        run: npm run check:size
        working-directory: .

      - name: Smoke test live routes
        run: npm run smoke
        working-directory: .
